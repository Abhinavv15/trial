<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <!-- Modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Rock Paper Scissors</h1>
            <div class="score-board">
                <div class="score-card">
                    <span class="label">Player</span>
                    <span id="player-score" class="score">0</span>
                </div>
                <div class="score-card">
                    <span class="label">Computer</span>
                    <span id="computer-score" class="score">0</span>
                </div>
            </div>
        </header>

        <div class="game-area">
            <div id="result-message" class="result-message">Choose your weapon!</div>
            <div class="choices">
                <button class="choice-btn" id="rock" aria-label="Rock">
                    <span class="emoji">✊</span>
                    <span class="choice-name">Rock</span>
                </button>
                <button class="choice-btn" id="paper" aria-label="Paper">
                    <span class="emoji">✋</span>
                    <span class="choice-name">Paper</span>
                </button>
                <button class="choice-btn" id="scissors" aria-label="Scissors">
                    <span class="emoji">✌️</span>
                    <span class="choice-name">Scissors</span>
                </button>
            </div>
        </div>

        <button id="reset-btn" class="reset-btn hidden">Reset Game</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
